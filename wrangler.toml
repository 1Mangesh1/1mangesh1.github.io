name = "portfolio-ai-proxy"
main = "worker.js"
compatibility_date = "2024-12-01"

# AI binding — gives access to Workers AI models, no API key needed
[ai]
binding = "AI"

# KV binding for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b77d2ec29ad04027a94aae88654643f9"

# D1 Database (chat logging)
[[d1_databases]]
binding = "CHAT_DB"
database_name = "mangesh-chatbot-db"
database_id = "bc45720d-5bbb-482c-8604-f038b0d9f02e"

# Scheduled Trigger (auto-cleanup every day at 3 AM UTC)
[triggers]
crons = ["0 3 * * *"]

# Environment variables
[vars]
FOOTPRINT_TOKEN_HASH = "9381d8b1ab676634fa938edffd43b819465a9d948f7a634b0fbba8283497f9fd"
